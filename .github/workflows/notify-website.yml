name: Notify Website

on:
  push:
    branches: [main]
    paths:
      - '**.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website sync and deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: CodyBontecou/video-suggestor
          event-type: vault-updated
